<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGuard AI Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .chat-container {
            width: 70%;
            margin: auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px #ccc;
        }

        #chatBox {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
        }

        .user-msg {
            text-align: right;
            margin: 10px;
        }

        .user-msg span {
            background: #0d6efd;
            color: white;
            padding: 10px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        .ai-msg {
            text-align: left;
            margin: 10px;
        }

        .ai-msg span {
            background: #e8e8e8;
            padding: 10px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            width: 70%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #aaa;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

</head>


<body>


<nav>
    <div class="logo">🏥 LifeGuard AI</div>
</nav>



<section class="hero">

<h1>🤖 AI Health Chatbot</h1>

<p>Your personal healthcare assistant</p>


<div class="chat-container">

<div id="chatBox"></div>

<br>

<input id="message"
       placeholder="Ask your health question..."
       onkeydown="if(event.key==='Enter') sendMessage()">


<button onclick="sendMessage()">
Send
</button>


</div>


</section>



<script>

function sendMessage(){

let input=document.getElementById("message");

let message=input.value.trim();


if(message===""){
    return;
}


let chatBox=document.getElementById("chatBox");


chatBox.innerHTML +=
`
<div class="user-msg">
<span>${message}</span>
</div>
`;


input.value="";


chatBox.innerHTML +=
`
<div class="ai-msg">
<span id="typing">AI is typing...</span>
</div>
`;



fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})


.then(response=>response.json())


.then(data=>{

document.getElementById("typing").innerHTML=data.reply;

chatBox.scrollTop=chatBox.scrollHeight;

});


}

</script>


</body>

</html>
